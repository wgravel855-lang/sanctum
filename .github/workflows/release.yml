name: release

# Builds the Windows installer in CI and signs it with SignPath, then attaches
# the SIGNED installer to the GitHub Release. See SIGNING.md for one-time setup.
#
# Trigger: push a version tag (e.g. `git tag v0.1.9 && git push origin v0.1.9`),
# or run manually from the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/update the GitHub Release
  id-token: write # OIDC (optional; SignPath can use it instead of a token)

jobs:
  build-and-sign:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # build-installer.ps1 compiles the three service binaries (release),
      # stages them as Tauri sidecars, and runs `npm install` + `npm run tauri
      # build` to produce the NSIS installer. Tauri downloads makensis itself.
      - name: Build installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools/build-installer.ps1

      - name: Stage installer under its stable name
        shell: pwsh
        run: |
          $exe = Get-ChildItem ui/src-tauri/target/release/bundle/nsis/Sanctum_*_x64-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "installer not found" }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $exe.FullName dist/Sanctum-Windows-Setup.exe
          Write-Host "staged $($exe.Name) -> Sanctum-Windows-Setup.exe"

      - name: Upload unsigned installer (SignPath signs this artifact)
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: dist/Sanctum-Windows-Setup.exe
          if-no-files-found: error

      # SignPath is a one-time setup (see SIGNING.md) and may not be configured
      # yet. Without this gate the sign step fails on every tag, which both
      # produces a misleading red run and skips the attach step anyway. When it
      # is unconfigured we simply build, publish the unsigned installer as a
      # workflow artifact, and leave the GitHub Release alone.
      - name: Check signing configuration
        id: signing
        shell: bash
        env:
          SIGNPATH_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORG: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
        run: |
          if [ -n "$SIGNPATH_TOKEN" ] && [ -n "$SIGNPATH_ORG" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SignPath is not configured, so signing was skipped and the release was left untouched. The unsigned installer is attached to this run as a build artifact. See SIGNING.md."
            echo "SignPath not configured - built unsigned, release untouched." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Sign with SignPath
        if: steps.signing.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: sanctum
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed installer as a build artifact
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: installer-signed
          path: signed/**

      # Only ever touches the release when a genuinely SIGNED binary exists.
      # `generate_release_notes` is deliberately off: releases are published with
      # hand-written notes carrying the installer's SHA-256, and auto-generated
      # notes would overwrite them.
      - name: Attach signed installer to the release
        if: steps.signing.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: signed/Sanctum-Windows-Setup.exe
          fail_on_unmatched_files: true
